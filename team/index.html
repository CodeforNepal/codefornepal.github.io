---
layout: page
title: Team
---
<!-- Team -->
<section class="bg-light page-section" id="{{ site.data.sitetext.team.section | default: "team" }}">
  <div class="container">
    <div class="row">
      <div class="col-lg-12 text-center">
        <h2 class="section-heading text-uppercase">{{ site.data.team.title }}</h2>
        <h3 class="section-subheading text-muted">{{ site.data.team.text }}</h3>
      </div>
    </div>

    <div id="teamGrid" style="display:grid; grid-template-columns:repeat(3, 1fr); gap:3rem 1.5rem; justify-items:center; margin-bottom:3rem;">
      {% for person in site.data.team.people %}
      <div style="width:100%; max-width:340px;">
        <div class="team-member">
          <img class="mx-auto rounded-circle" src="{{ person.image | prepend: site.baseurl }}" alt="" style="width:280px; height:280px; object-fit:cover; border: 7px solid rgba(0,0,0,0.1);">
          <a href = "{{person.linkedin_url}}" class="text-decoration-none" target= "blank">
            <h4>{{ person.name }}</h4>
          </a>
          <p class="text-muted">{{ person.role }}</p>
          <ul class="list-inline social-buttons">
            {% for network in person.social %}
            <li class="list-inline-item">
              <a href="{{ network.url }}">
                <i class="{{ network.icon }}"></i>
              </a>
            </li>
            {% endfor %}
          </ul>
        </div>
      </div>
      {% endfor %}
    </div>

    <style>
    @media (max-width: 768px) {
      #teamGrid {
        grid-template-columns: 1fr !important;
        gap: 2rem 1.5rem !important;
      }
    }
    </style>

    <div class="row">
      <div class="col-lg-8 mx-auto text-center">
        <div class="large text-muted">{{ site.data.sitetext.team.subtext | markdownify }}</div>
      </div>
    </div>
  </div>
</section>
<!-- End Team -->
