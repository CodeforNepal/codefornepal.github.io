<!-- What We Do - Pillars -->
{% if site.data.sitetext.pillars %}
<section id="pillars" style="padding:5rem 0; background:white;">
  <div style="max-width:1100px; margin:0 auto; padding:0 1.5rem;">

    <!-- Section header -->
    <div style="text-align:center; margin-bottom:3.5rem;">
      <p style="font-size:0.7rem; text-transform:uppercase; letter-spacing:0.35em; color:#dc2626; margin-bottom:0.6rem; font-family:'Montserrat',sans-serif; font-weight:600;">Our mission</p>
      <h2 style="font-size:clamp(1.75rem,4vw,2.5rem); font-weight:700; color:#111827; margin:0; font-family:'Montserrat',sans-serif; letter-spacing:-0.02em;">What We Do</h2>
    </div>

    <!-- 2x2 pillars grid -->
    <div id="pillarsGrid" style="display:grid; grid-template-columns:repeat(2, 1fr); gap:1.5rem;">
      {% for pillar in site.data.sitetext.pillars %}
      <div style="padding:2rem; border:1px solid #f3f4f6; display:flex; gap:1.25rem; align-items:flex-start;"
           onmouseover="this.style.boxShadow='0 4px 24px rgba(0,0,0,0.07)'; this.style.borderColor='#e5e7eb';"
           onmouseout="this.style.boxShadow='none'; this.style.borderColor='#f3f4f6';">
        <div style="flex-shrink:0; width:2.75rem; height:2.75rem; background:#fef2f2; border-radius:8px; display:flex; align-items:center; justify-content:center;">
          <i class="{{ pillar.icon }}" style="color:#dc2626; font-size:1.1rem;"></i>
        </div>
        <div>
          <h3 style="font-size:1rem; font-weight:700; color:#111827; margin:0 0 0.5rem; font-family:'Montserrat',sans-serif;">{{ pillar.title }}</h3>
          <p style="font-size:0.88rem; color:#6b7280; line-height:1.65; margin:0; font-family:'Droid Serif','Georgia',serif;">{{ pillar.desc }}</p>
        </div>
      </div>
      {% endfor %}
    </div>

  </div>
</section>
<style>
@media (max-width: 640px) {
  #pillarsGrid {
    grid-template-columns: 1fr !important;
  }
}
</style>
{% endif %}
<!-- End Pillars -->
