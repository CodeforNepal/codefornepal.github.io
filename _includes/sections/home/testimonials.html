<!-- Testimonials -->
{% if site.data.sitetext.testimonials %}
<section id="testimonials" style="padding:5rem 0; background:#f9fafb;">
  <div style="max-width:1100px; margin:0 auto; padding:0 1.5rem;">

    <!-- Section header -->
    <div style="text-align:center; margin-bottom:3.5rem;">
      <p style="font-size:0.7rem; text-transform:uppercase; letter-spacing:0.35em; color:#dc2626; margin-bottom:0.6rem; font-family:'Montserrat',sans-serif; font-weight:600;">Stories</p>
      <h2 style="font-size:clamp(1.75rem,4vw,2.5rem); font-weight:700; color:#111827; margin:0; font-family:'Montserrat',sans-serif; letter-spacing:-0.02em;">What our fellows say</h2>
    </div>

    <!-- Testimonials grid -->
    <div id="testimonialsGrid" style="display:grid; grid-template-columns:repeat(2, 1fr); gap:2rem;">
      {% for testimonial in site.data.sitetext.testimonials %}
      <div style="background:white; padding:2.5rem; border:1px solid #f3f4f6; position:relative;"
           onmouseover="this.style.boxShadow='0 4px 24px rgba(0,0,0,0.06)'" onmouseout="this.style.boxShadow='none'">
        <div style="font-size:4rem; color:#dc2626; font-family:Georgia,serif; line-height:1; margin-bottom:1rem; opacity:0.4;">&ldquo;</div>
        <p style="font-size:1rem; color:#374151; line-height:1.75; margin-bottom:2rem; font-family:'Droid Serif','Georgia',serif; font-style:italic;">
          {{ testimonial.quote }}
        </p>
        <div style="display:flex; align-items:center; gap:0.75rem;">
          <div style="width:40px; height:40px; background:#fef2f2; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0;">
            <i class="fas fa-user" style="color:#dc2626; font-size:0.9rem;"></i>
          </div>
          <div>
            <p style="margin:0; font-size:0.85rem; font-weight:700; color:#111827; font-family:'Montserrat',sans-serif;">{{ testimonial.name }}</p>
            <p style="margin:0; font-size:0.75rem; color:#9ca3af; font-family:'Montserrat',sans-serif;">{{ testimonial.role }}</p>
          </div>
        </div>
      </div>
      {% endfor %}
    </div>

  </div>
</section>
<style>
@media (max-width: 640px) {
  #testimonialsGrid {
    grid-template-columns: 1fr !important;
  }
}
</style>
{% endif %}
<!-- End Testimonials -->
