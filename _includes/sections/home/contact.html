<!-- Contact -->
<section id="{{ site.data.sitetext.contact.section | default: 'contact' }}" style="padding:6rem 0; background:#111827;">
  <div style="max-width:1000px; margin:0 auto; padding:0 1.5rem;">

    <div id="contact-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:4rem; align-items:start;">

      <!-- Left: info -->
      <div style="color:white;">
        <p style="font-size:0.7rem; text-transform:uppercase; letter-spacing:0.35em; color:rgba(255,255,255,0.4); margin-bottom:0.75rem; font-family:'Montserrat',sans-serif; font-weight:500;">Get in touch</p>
        <h2 style="font-size:clamp(1.75rem,3.5vw,2.25rem); font-weight:700; color:white; margin-bottom:1.25rem; font-family:'Montserrat',sans-serif; letter-spacing:-0.02em;">
          {{ site.data.sitetext.contact.title | default: "Contact Us" }}
        </h2>
        <div style="font-size:0.95rem; color:rgba(255,255,255,0.65); line-height:1.8; font-family:'Droid Serif','Georgia',serif; margin-bottom:2rem;">
          {{ site.data.sitetext.contact.text | markdownify }}
        </div>
        <div style="display:flex; flex-direction:column; gap:0.75rem;">
          <a href="mailto:{{ site.email }}" style="font-size:0.85rem; color:rgba(255,255,255,0.6); text-decoration:none; font-family:'Montserrat',sans-serif; display:flex; align-items:center; gap:0.5rem;"
             onmouseover="this.style.color='white'" onmouseout="this.style.color='rgba(255,255,255,0.6)'">
            <i class="fas fa-envelope" style="color:#dc2626; width:1rem;"></i>
            {{ site.email }}
          </a>
        </div>
      </div>

      <!-- Right: form -->
      <div>
        <form id="contactForm" action="https://formspree.io/{{ site.email }}" novalidate="novalidate" method="POST">
          <input type="hidden" name="_subject" value="Contact Form Submission">
          <input type="text" name="_gotcha" style="display:none">
          <input type="hidden" name="_next" value="#">

          <div style="display:flex; flex-direction:column; gap:1rem;">
            <input name="name" type="text" placeholder="Your name *" required
                   style="width:100%; padding:0.875rem 1rem; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12); color:white; font-size:0.9rem; font-family:'Montserrat',sans-serif; outline:none; transition:border-color 0.2s; box-sizing:border-box;"
                   onfocus="this.style.borderColor='rgba(255,255,255,0.4)'" onblur="this.style.borderColor='rgba(255,255,255,0.12)'">

            <input name="_replyto" type="email" placeholder="Email address *" required
                   style="width:100%; padding:0.875rem 1rem; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12); color:white; font-size:0.9rem; font-family:'Montserrat',sans-serif; outline:none; transition:border-color 0.2s; box-sizing:border-box;"
                   onfocus="this.style.borderColor='rgba(255,255,255,0.4)'" onblur="this.style.borderColor='rgba(255,255,255,0.12)'">

            <textarea name="message" placeholder="Your message *" required rows="5"
                      style="width:100%; padding:0.875rem 1rem; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12); color:white; font-size:0.9rem; font-family:'Montserrat',sans-serif; outline:none; transition:border-color 0.2s; resize:vertical; box-sizing:border-box;"
                      onfocus="this.style.borderColor='rgba(255,255,255,0.4)'" onblur="this.style.borderColor='rgba(255,255,255,0.12)'"></textarea>

            <div id="success" style="font-size:0.85rem; color:#4ade80; font-family:'Montserrat',sans-serif;"></div>

            <button type="submit"
                    style="padding:0.9rem 2rem; background:#dc2626; color:white; border:none; font-size:0.8rem; font-weight:600; text-transform:uppercase; letter-spacing:0.12em; font-family:'Montserrat',sans-serif; cursor:pointer; transition:background 0.2s; align-self:flex-start;"
                    onmouseover="this.style.background='#b91c1c'" onmouseout="this.style.background='#dc2626'">
              Send Message
            </button>
          </div>
        </form>
      </div>

    </div>
  </div>
</section>

<style>
#contactForm input::placeholder,
#contactForm textarea::placeholder {
  color: rgba(255,255,255,0.35);
}
@media (max-width: 680px) {
  #contact-grid { grid-template-columns: 1fr !important; gap: 2.5rem !important; }
}
</style>
<!-- End Contact -->
