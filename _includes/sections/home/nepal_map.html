<!-- Nepal Impact Map Section -->
<!-- Leaflet CDN Resources (integrity removed for loading safety) -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<section id="nepal-impact-map" style="padding: 6rem 0; background: #0f172a; color: white;">
  <div style="max-width: 1200px; margin: 0 auto; padding: 0 1.5rem;">
    
    <!-- Title & Intro -->
    <div style="text-align: center; margin-bottom: 4rem;">
      <h2 style="font-size: clamp(2rem, 4vw, 2.75rem); font-weight: 700; font-family: 'Montserrat', sans-serif; margin-bottom: 1rem; letter-spacing: -0.02em;">
        Our Regional Impact
      </h2>
      <p style="font-size: 1.1rem; color: #94a3b8; max-width: 600px; margin: 0 auto; font-family: 'Droid Serif', serif; line-height: 1.6;">
        Hover or click on the interactive map of Nepal to explore the regions where we are training fellows, building open source tools, and supporting digital literacy.
      </p>
    </div>

    <!-- Centered Map Container (Panel removed) -->
    <div style="max-width: 1000px; margin: 0 auto;">
      <!-- Interactive Leaflet Map Wrapper (No background, no boundary box, increased height) -->
      <div style="position: relative; height: 500px; box-sizing: border-box; z-index: 10;">
        <div id="nepal-leaflet-map" style="width: 100%; height: 100%; background: transparent; pointer-events: auto !important;"></div>
        
        <!-- Custom Floating Tooltip Div (Workaround: ES5 format, absolute mouse-sticky positioning) -->
        <div id="svg-map-tooltip" style="position: absolute; display: none; background: #1e293b; border: 1px solid #334155; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); padding: 1rem; color: white; font-family: 'Montserrat', sans-serif; font-size: 0.8rem; pointer-events: none; z-index: 10000; width: 290px; box-sizing: border-box; line-height: 1.5; opacity: 0.98; transition: opacity 0.15s ease;">
          <!-- Populated dynamically via JS -->
        </div>
      </div>

      <!-- Legend underneath the map -->
      <div style="display: flex; gap: 2rem; margin-top: 2rem; justify-content: center; flex-wrap: wrap;">
        <div style="display: flex; align-items: center; gap: 0.5rem;">
          <span style="width: 12px; height: 12px; background: #dc2626; border-radius: 50%; display: inline-block;"></span>
          <span style="font-size: 0.78rem; font-family: 'Montserrat', sans-serif; font-weight: 600; color: #cbd5e1; letter-spacing: 0.02em;">Active Impact (3 Provinces)</span>
        </div>
        <div style="display: flex; align-items: center; gap: 0.5rem;">
          <span style="width: 12px; height: 12px; background: #475569; border-radius: 50%; display: inline-block;"></span>
          <span style="font-size: 0.78rem; font-family: 'Montserrat', sans-serif; font-weight: 600; color: #94a3b8; letter-spacing: 0.02em;">Future Expansion</span>
        </div>
      </div>
    </div>

  </div>
</section>

<style>
/* Leaflet custom map pane visual overrides */
.leaflet-container {
  background: transparent !important;
  font-family: 'Montserrat', sans-serif;
}
.leaflet-control-attribution {
  display: none !important;
}
.leaflet-interactive {
  outline: none !important;
  cursor: pointer !important;
}
</style>

<script>
(function() {
  var provData = {
    "prov-koshi": {
      title: "Koshi Province",
      tag: "Active Impact",
      tagColor: "#ffffff",
      tagBg: "#dc2626",
      desc: "Koshi supports a growing network of open source contributors and data advocates. Local training seminars educate public sector representatives and volunteers on using open data tools for community research.",
      m1: "Regional Tech Seminars",
      m2: "Open Source Contributor Hubs"
    },
    "prov-madhesh": {
      title: "Madhesh Province",
      tag: "Active Impact",
      tagColor: "#ffffff",
      tagBg: "#dc2626",
      desc: "A core focus region for digital literacy and inclusion. We run coding bootcamps and localized workshops here for young girls and underrepresented youths, fostering career entries into the tech sector.",
      m1: "Girls Who Code Bootcamps",
      m2: "Digital Literacy Workshops"
    },
    "prov-bagmati": {
      title: "Bagmati Province",
      tag: "Active Impact",
      tagColor: "#ffffff",
      tagBg: "#dc2626",
      desc: "Our primary hub for advanced civic technology development and open data advocacy. Bagmati has hosted 4 key hackathons and our central tech fellowships, connecting developers with municipal open data projects.",
      m1: "Civic Tech Fellowships",
      m2: "Open Data Portals"
    },
    "prov-gandaki": {
      title: "Gandaki Province",
      tag: "Future Expansion",
      tagColor: "#ffffff",
      tagBg: "#475569",
      desc: "Gandaki is a major source of tech talent in our virtual networks. Local developers collaborate online with our Bagmati teams on municipal dashboard builds and open codebases.",
      m1: "Collaborative Dashboards",
      m2: "Online Developer Networks"
    },
    "prov-lumbini": {
      title: "Lumbini Province",
      tag: "Future Expansion",
      tagColor: "#ffffff",
      tagBg: "#475569",
      desc: "Lumbini province hosts virtual user group meetings. We are actively seeking local institutional partners in Lumbini to co-launch digital training modules and data camps.",
      m1: "Virtual User Groups",
      m2: "Partnership Exploration"
    },
    "prov-karnali": {
      title: "Karnali Province",
      tag: "Future Expansion",
      tagColor: "#ffffff",
      tagBg: "#475569",
      desc: "A key target area for our upcoming digital literacy outreach campaigns. Remote participants from Karnali join our virtual mentoring tracks to build coding capabilities.",
      m1: "Virtual Mentorships",
      m2: "Future Expansion Target"
    },
    "prov-sudurpashchim": {
      title: "Sudurpashchim Province",
      tag: "Future Expansion",
      tagColor: "#ffffff",
      tagBg: "#475569",
      desc: "While we do not have local bootcamps here yet, Sudurpashchim is home to several virtual community members and remote fellowship participants. We plan to establish regional workshops here soon.",
      m1: "Remote Program Access",
      m2: "Community Growth Area"
    }
  };

  var provMapping = {
    "1": "prov-koshi",
    "2": "prov-madhesh",
    "3": "prov-bagmati",
    "4": "prov-gandaki",
    "5": "prov-lumbini",
    "6": "prov-karnali",
    "7": "prov-sudurpashchim"
  };

  function initMapInteraction() {
    var mapEl = document.getElementById("nepal-leaflet-map");
    if (!mapEl || mapEl.classList.contains("leaflet-container")) return;

    if (typeof L === "undefined") {
      setTimeout(initMapInteraction, 50);
      return;
    }

    var map = L.map("nepal-leaflet-map", {
      center: [28.2, 84.15],
      zoom: 7,
      dragging: false,
      zoomControl: false,
      scrollWheelZoom: false,
      doubleClickZoom: false,
      boxZoom: false,
      keyboard: false,
      touchZoom: false
    });

    var geojsonLayer;
    var sizeRecalculated = false;

    // Load states GeoJSON locally to prevent CDN/CORS errors
    fetch("{{ site.baseurl }}/assets/data/nepal-states.geojson")
      .then(function(res) { return res.json(); })
      .then(function(data) {
        geojsonLayer = L.geoJSON(data, {
          style: function(feature) {
            var code = "";
            if (feature.properties.ADM1_EN) {
              code = String(feature.properties.ADM1_EN).trim();
            } else if (feature.properties.ADM1_PCODE) {
              var pcode = String(feature.properties.ADM1_PCODE).trim();
              var numMatch = pcode.match(/\d+/);
              if (numMatch) {
                code = String(parseInt(numMatch[0]));
              }
            }
            var isImpacted = (code === "1" || code === "2" || code === "3");
            return {
              fillColor: isImpacted ? "#dc2626" : "#475569",
              fillOpacity: 1,
              color: "#0f172a", // boundary border matches background color of section
              weight: 2,
              opacity: 1
            };
          },
          onEachFeature: function(feature, layer) {
            var code = "";
            if (feature.properties.ADM1_EN) {
              code = String(feature.properties.ADM1_EN).trim();
            } else if (feature.properties.ADM1_PCODE) {
              var pcode = String(feature.properties.ADM1_PCODE).trim();
              var numMatch = pcode.match(/\d+/);
              if (numMatch) {
                code = String(parseInt(numMatch[0]));
              }
            }
            var provId = provMapping[code];
            var isImpacted = (code === "1" || code === "2" || code === "3");
            var info = provData[provId];

            // ES5 function to prevent legacy Jekyll compressor parser crashes
            function getTooltipHtml(info) {
              return '<div style="font-family: \'Montserrat\', sans-serif; padding: 0.15rem; max-width: 290px; white-space: normal; line-height: 1.5;">' +
                '<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.6rem; gap: 1.5rem;">' +
                  '<strong style="font-size: 0.88rem; color: #ffffff; font-weight: 700; letter-spacing: -0.01em;">' + info.title + '</strong>' +
                  '<span style="font-size: 0.58rem; text-transform: uppercase; font-weight: 700; color: ' + info.tagColor + '; background: ' + info.tagBg + '; padding: 0.2rem 0.6rem; border-radius: 100px; letter-spacing: 0.05em; display: inline-block;">' + info.tag + '</span>' +
                '</div>' +
                '<p style="font-size: 0.8rem; color: #cbd5e1; line-height: 1.5; margin: 0 0 0.75rem 0; font-family: \'Droid Serif\', serif;">' + info.desc + '</p>' +
                '<div style="border-top: 1px solid #475569; padding-top: 0.6rem; display: flex; flex-direction: column; gap: 0.3rem;">' +
                  '<div style="font-size: 0.68rem; color: #94a3b8; font-family: \'Montserrat\', sans-serif;"><span style="text-transform: uppercase; font-weight: 600; color: #94a3b8; letter-spacing: 0.05em;">Key Program:</span> <span style="color: #ffffff; font-weight: 500; padding-left: 0.25rem;">' + info.m1 + '</span></div>' +
                  '<div style="font-size: 0.68rem; color: #94a3b8; font-family: \'Montserrat\', sans-serif;"><span style="text-transform: uppercase; font-weight: 600; color: #94a3b8; letter-spacing: 0.05em;">Impact Focus:</span> <span style="color: #ffffff; font-weight: 500; padding-left: 0.25rem;">' + info.m2 + '</span></div>' +
                '</div>' +
              '</div>';
            }

            layer.on({
              mouseover: function(e) {
                var l = e.target;
                // High-visibility hover style changes: brightened fills and distinct white border outlines
                l.setStyle({
                  fillColor: isImpacted ? "#f87171" : "#94a3b8",
                  color: "#ffffff",
                  weight: 3
                });

                var tooltip = document.getElementById("svg-map-tooltip");
                if (info && tooltip) {
                  tooltip.innerHTML = getTooltipHtml(info);
                  tooltip.style.display = "block";
                }
              },
              mousemove: function(e) {
                var tooltip = document.getElementById("svg-map-tooltip");
                var mapContainer = document.getElementById("nepal-leaflet-map");
                if (tooltip && mapContainer && e.containerPoint) {
                  var x = e.containerPoint.x + 15;
                  var y = e.containerPoint.y + 15;
                  var width = mapContainer.clientWidth;

                  // Prevent right edge boundary overflow
                  if (x + 290 > width) {
                    x = e.containerPoint.x - 305;
                  }

                  tooltip.style.left = x + "px";
                  tooltip.style.top = y + "px";
                }
              },
              mouseout: function(e) {
                var l = e.target;
                // Reset to default style values
                l.setStyle({
                  fillColor: isImpacted ? "#dc2626" : "#475569",
                  color: "#0f172a",
                  weight: 2
                });

                var tooltip = document.getElementById("svg-map-tooltip");
                if (tooltip) {
                  tooltip.style.display = "none";
                }
              },
              click: function(e) {
                L.DomEvent.stopPropagation(e);
                
                var l = e.target;
                l.setStyle({
                  fillColor: isImpacted ? "#f87171" : "#94a3b8",
                  color: "#ffffff",
                  weight: 3
                });

                var tooltip = document.getElementById("svg-map-tooltip");
                var mapContainer = document.getElementById("nepal-leaflet-map");
                if (info && tooltip && mapContainer && e.containerPoint) {
                  tooltip.innerHTML = getTooltipHtml(info);
                  tooltip.style.display = "block";

                  var x = e.containerPoint.x + 15;
                  var y = e.containerPoint.y + 15;
                  var width = mapContainer.clientWidth;

                  if (x + 290 > width) {
                    x = e.containerPoint.x - 305;
                  }

                  tooltip.style.left = x + "px";
                  tooltip.style.top = y + "px";
                }
              }
            });
          }
        }).addTo(map);

        // Repaint map container size and fit bounds on initial load
        setTimeout(function() {
          map.invalidateSize();
          map.fitBounds(geojsonLayer.getBounds(), {
            padding: [20, 20]
          });
        }, 100);
      })
      .catch(function(err) {
        console.error("Error loading Nepal map GeoJSON:", err);
      });

    function checkAndInvalidate() {
      if (document.body.classList.contains("is-scrolled") && !sizeRecalculated) {
        sizeRecalculated = true;
        setTimeout(function() {
          map.invalidateSize();
          if (geojsonLayer) {
            map.fitBounds(geojsonLayer.getBounds(), {
              padding: [20, 20]
            });
          }
        }, 400);
      }
    }

    // Force map recalculation on scroll or load checkpoints
    window.addEventListener("scroll", checkAndInvalidate);
    setTimeout(checkAndInvalidate, 500);
    setTimeout(checkAndInvalidate, 1500);
  }

  // Handle load state
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", initMapInteraction);
  } else {
    initMapInteraction();
  }
})();
</script>
