<!-- Impact Stats -->
{% if site.data.sitetext.impact %}
<section id="impact" style="padding:4rem 0; background:#f9fafb; border-bottom:1px solid #f3f4f6;">
  <div style="max-width:1100px; margin:0 auto; padding:0 1.5rem;">
    <div id="impactGrid" style="display:grid; grid-template-columns:repeat(4, 1fr); gap:0;">
      {% for stat in site.data.sitetext.impact.stats %}
      <div style="text-align:center; padding:2rem 1rem; {% unless forloop.last %}border-right:1px solid #e5e7eb;{% endunless %}">
        <div class="stat-number-counter" data-stat="{{ stat.number }}" style="font-size:2.5rem; font-weight:700; color:#111827; font-family:'Montserrat',sans-serif; line-height:1; margin-bottom:0.5rem;">
          0
        </div>
        <div style="font-size:0.72rem; text-transform:uppercase; letter-spacing:0.15em; color:#6b7280; font-family:'Montserrat',sans-serif; font-weight:500;">
          {{ stat.label }}
        </div>
      </div>
      {% endfor %}
    </div>
  </div>
</section>

<script>
(function() {
  function initCounters() {
    var counters = document.querySelectorAll(".stat-number-counter");
    if (!counters.length) return;

    var observer = new IntersectionObserver(function(entries, observer) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          animateCounter(entry.target);
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1 });

    counters.forEach(function(counter) {
      observer.observe(counter);
    });

    function animateCounter(counter) {
      var statString = counter.getAttribute("data-stat") || "";
      var match = statString.match(/^([\d\.]+)([a-zA-Z\+]+)?$/);
      if (!match) {
        counter.textContent = statString;
        return;
      }

      var targetNum = parseFloat(match[1]);
      var suffix = match[2] || "";
      var duration = 2000; // 2 seconds animation duration
      var startTime = null;

      function step(timestamp) {
        if (!startTime) startTime = timestamp;
        var progress = timestamp - startTime;
        var percentage = Math.min(progress / duration, 1);
        
        // Easing out quad
        var easeProgress = 1 - (1 - percentage) * (1 - percentage);
        var currentNum = Math.floor(easeProgress * targetNum);
        
        counter.textContent = currentNum + suffix;

        if (progress < duration) {
          window.requestAnimationFrame(step);
        } else {
          counter.textContent = statString;
        }
      }

      window.requestAnimationFrame(step);
    }
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", initCounters);
  } else {
    initCounters();
  }
})();
</script>

<style>
@media (max-width: 600px) {
  #impactGrid {
    grid-template-columns: repeat(2, 1fr) !important;
  }
  #impactGrid > div {
    border-right: none !important;
    border-bottom: 1px solid #e5e7eb;
  }
  #impactGrid > div:nth-child(odd) {
    border-right: 1px solid #e5e7eb !important;
  }
  #impactGrid > div:nth-child(3),
  #impactGrid > div:nth-child(4) {
    border-bottom: none !important;
  }
}
</style>
{% endif %}
<!-- End Impact Stats -->
