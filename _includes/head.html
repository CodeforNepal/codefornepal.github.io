<head>
  {% if site.analytics.google %}
  <!-- Global site tag (gtag.js) - Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id={{ site.analytics.google }}"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());

    gtag('config', '{{ site.analytics.google }}');
  </script>
  <!-- End Google Analytics -->
  {% endif %}

  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <meta name="description" content="{{ site.description }}">
  <meta name="author" content="{{ site.author }}">
  <meta name="keyword" content="code for nepal, c4n, volunteer, code, nepal" />
  <meta property="og:locale" content="en_US">
  <meta property="fb:pages" content="201272103415379">

  {% include components/meta.html %}


  <title>
    {% if page.title %}
    {{ page.title | append: " | " | append: site.title }}
    {% else %}
    {{ site.title }}
    {% endif %}
  </title>

  <!-- Bootstrap core CSS -->
  <!-- <link href="/assets/css/bootstrap.min.css" rel="stylesheet"> -->

  <!-- Custom fonts for this template -->
  <link href="/assets/css/all.min.css" rel="stylesheet" type="text/css">
  <link href="https://fonts.googleapis.com/css?family=Montserrat:400,700" rel="stylesheet" type="text/css">
  <link href='https://fonts.googleapis.com/css?family=Kaushan+Script' rel='stylesheet' type='text/css'>
  <link href='https://fonts.googleapis.com/css?family=Droid+Serif:400,700,400italic,700italic' rel='stylesheet'
    type='text/css'>
  <link href='https://fonts.googleapis.com/css?family=Roboto+Slab:400,100,300,700' rel='stylesheet' type='text/css'>

  <!-- Custom styles for this theme -->
  <link href="/assets/css/agency.css" rel="stylesheet">

  <!-- Global responsive design tokens -->
  <style>
    /* Ensure nav always has proper top offset for fixed nav (64px) */
    body { padding-top: 64px; }

    /* Page layouts get extra top padding for content readability */
    {% if page.layout == "page" or page.layout == "post" %}
    #pagecontainer {
      padding-top: 3rem;
      padding-bottom: 5rem;
    }
    @media (max-width: 991px) {
      #pagecontainer { padding-top: 2rem; }
    }
    {% endif %}

    /* Responsive grid helpers used across all sections */
    @media (max-width: 768px) {
      [style*="grid-template-columns:35% 30% 35%"] { grid-template-columns: 1fr !important; }
      [style*="grid-template-columns:1fr 1fr"] { grid-template-columns: 1fr !important; }
      [style*="gap:4rem"] { gap: 2rem !important; }
      [style*="padding:6rem 0"] { padding: 3.5rem 0 !important; }
      [style*="padding:5rem 0"] { padding: 3rem 0 !important; }
    }

    /* Details/summary FAQ animation */
    details > div {
      animation: fadeInDown 0.2s ease;
    }
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    details summary::-webkit-details-marker { display: none; }
    details summary { list-style: none; }
  </style>

</head>
