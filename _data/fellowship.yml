about:
  title: "Data Fellowship 2026"
  image: "assets/about.svg"
  template: "default"
  text: "
  We are pleased to announce that applications are open for the Code for Nepal Data Fellowship. The objective of this fellowship, organized by **[Code for Nepal](https://www.codefornepal.org/)** with support from **[DataCamp](https://www.datacamp.com/)** and **[TechPana](https://www.techpana.com/)**, is to help anyone build their AI and data skills, make progress in their lives, and help Nepal become a tech hub.
  <br><br>
  
  Data Fellows will get access to a Premium DataCamp subscription (typically <strong>$330/year</strong>), along with support for career opportunities and networking. We are grateful to DataCamp for donating access to their expert-led data skill training, used by 1,600+ companies including Google, Uber, and PayPal.
  <br><br>
  **See below for details about the Fellowship and apply!**
  "

  about_program: "
  The Data Fellowship includes:
                        <ol>
                        <li class='custom_li'>A DataCamp Premium subscription to take courses and earn certificates.</li>
                        <li class='custom_li'>Opportunity to publish data visualizations and blog posts via the Code for Nepal site. Selected posts (from fellows who've earned a DataCamp certificate) earn a Nrs 5,000 stipend.</li>
                        <li class='custom_li'>Industry/academia expert teaching assistants (offline and online) to support learning and community participation.</li>
                        <li class='custom_li'>Involvement in Open Source Projects.</li>
                        <li class='custom_li'>A digital certificate from Code for Nepal after completion of the fellowship.</li>
                        <li class='custom_li'>Opportunity to contribute to open source data projects after the program.</li>
                        <li class='custom_li'>Opportunity to be part of the Code for Nepal Community.</li>
                        </ol>
                        <br>

                        <div class='text-center'>
                        <a href='https://docs.google.com/forms/d/e/1FAIpQLSfjd4VXYxSOxc707VXc9gwVJ2k8urkRR258AMFgD0eqDGpgWA/viewform' class='btn btn-primary' target='_blank'>Apply Now</a>
                        </div>
                        "